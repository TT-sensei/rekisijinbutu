<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>れきし探偵団</title>
<script src="people.js"></script>
<script src="questions.js"></script>
<style>
:root{
  --bg:#12131a; --surface:#1c1e2b; --card:#252840;
  --accent:#e8504a; --gold:#f0b429;
  --text:#eef2ff; --subtext:#7a86a0;
  --green:#4ade80; --red:#f87171;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --radius:16px;
  --fs-base:1rem; --fs-sm:.85rem; --fs-xs:.74rem;
  --pad:20px 20px 40px;
}
@media(min-width:768px){:root{--fs-base:1.08rem;--fs-sm:.92rem;--fs-xs:.8rem;--pad:28px 36px 52px}}
@media(min-width:1024px){:root{--fs-base:1.12rem;--fs-sm:.96rem;--fs-xs:.84rem;--pad:32px 52px 60px}}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  user-select:none;touch-action:manipulation;
}

/* ══ HEADER ══ */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:var(--surface);border-bottom:2px solid var(--card);
  flex-shrink:0;gap:12px;
}
@media(min-width:768px){#header{padding:14px 36px}}
#header-left{display:flex;align-items:center;gap:10px;min-width:0}
#back-btn{
  display:none;
  background:var(--card);border:none;color:var(--text);
  width:36px;height:36px;border-radius:10px;cursor:pointer;
  font-size:1.1rem;align-items:center;justify-content:center;flex-shrink:0;
}
#back-btn.show{display:flex}
#header h1{
  font-size:1.15rem;font-weight:900;letter-spacing:.04em;
  color:var(--gold);cursor:pointer;white-space:nowrap;
}
@media(min-width:768px){#header h1{font-size:1.35rem}}
#hud{display:flex;gap:12px;align-items:center;flex-shrink:0}
@media(min-width:768px){#hud{gap:20px}}
.hud-item{display:flex;flex-direction:column;align-items:center;line-height:1.2}
.hud-label{font-size:.56rem;color:var(--subtext);letter-spacing:.06em}
.hud-val{font-size:.88rem;font-weight:800}
/* コンボ表示 */
#combo-display{
  display:none;
  background:linear-gradient(135deg,var(--gold),#e07b00);
  color:#12131a;font-weight:900;font-size:.78rem;
  padding:4px 10px;border-radius:20px;
  animation:comboPulse .4s ease;
}
#combo-display.show{display:block}
@keyframes comboPulse{0%{transform:scale(1.3)}100%{transform:scale(1)}}
#xp-bar-wrap{width:76px;height:6px;background:#2a2a4a;border-radius:3px;overflow:hidden;margin-top:3px}
@media(min-width:768px){#xp-bar-wrap{width:100px}}
#xp-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;transition:width .4s}
#collection-btn{
  background:var(--card);border:1.5px solid #353860;
  color:var(--text);padding:7px 12px;border-radius:20px;
  cursor:pointer;font-size:var(--fs-xs);font-weight:700;
  white-space:nowrap;min-height:36px;
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
@media(min-width:768px){#collection-btn{padding:8px 16px;font-size:var(--fs-sm)}}

/* ══ MAIN ══ */
#main{flex:1;overflow-y:auto;padding:var(--pad)}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:var(--card);border-radius:3px}
.screen{display:none}
.screen.active{display:block}

/* ── ボタン共通 ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 32px;border-radius:40px;border:none;cursor:pointer;
  font-size:var(--fs-base);font-weight:800;letter-spacing:.04em;
  transition:transform .15s,box-shadow .15s;min-height:52px;
}
@media(min-width:768px){.btn{padding:16px 44px;min-height:56px}}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;box-shadow:0 4px 20px rgba(232,80,74,.4)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(232,80,74,.6)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid #353860}
.btn-review{background:linear-gradient(135deg,#c07800,#8a5200);color:#fff;box-shadow:0 4px 16px rgba(192,120,0,.4)}

/* ══════════════════════
   TITLE
══════════════════════ */
#title-screen{
  max-width:520px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;
  gap:28px;padding-top:12px;text-align:center;
}
.title-icon{font-size:5rem;line-height:1}
@media(min-width:768px){.title-icon{font-size:6rem}}
.title-h{font-size:2.5rem;font-weight:900;color:var(--gold);text-shadow:0 0 32px rgba(240,180,41,.35);line-height:1.15}
@media(min-width:768px){.title-h{font-size:3rem}}
.title-sub{font-size:var(--fs-sm);color:var(--subtext);line-height:1.9}
.title-start{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
#daily-status{font-size:var(--fs-xs);color:var(--subtext)}

/* ══════════════════════
   MODE SELECT
══════════════════════ */
#mode-screen{
  max-width:640px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.mode-heading{font-size:1.1rem;font-weight:900;color:var(--gold);text-align:center}
@media(min-width:768px){.mode-heading{font-size:1.3rem}}
.mode-cards{display:flex;flex-direction:column;gap:14px;width:100%}
@media(min-width:520px){.mode-cards{flex-direction:row}}
.mode-card{
  flex:1;background:var(--surface);border:2px solid var(--card);
  border-radius:var(--radius);padding:26px 18px;
  text-align:center;cursor:pointer;
  transition:border-color .15s,transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.mode-card:hover,.mode-card:active{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.mode-card-icon{font-size:2.8rem}
@media(min-width:768px){.mode-card-icon{font-size:3.4rem}}
.mode-card-title{font-size:1.1rem;font-weight:900}
@media(min-width:768px){.mode-card-title{font-size:1.25rem}}
.mode-card-desc{font-size:var(--fs-sm);color:var(--subtext);line-height:1.7}

/* ══════════════════════
   ERA SELECT
══════════════════════ */
#era-screen{max-width:800px;margin:0 auto}
.screen-heading{font-size:1.1rem;font-weight:900;color:var(--gold);margin-bottom:18px}
@media(min-width:768px){.screen-heading{font-size:1.3rem;margin-bottom:22px}}
.era-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
@media(min-width:768px){.era-grid{gap:16px}}
.era-card{
  background:var(--surface);border:2px solid var(--card);
  border-radius:var(--radius);padding:18px 16px;
  cursor:pointer;
  transition:border-color .15s,transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;gap:7px;min-height:90px;
}
@media(min-width:768px){.era-card{padding:22px 20px;min-height:108px}}
.era-card:hover,.era-card:active{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.era-card-name{font-size:1.15rem;font-weight:900;color:var(--gold)}
.era-card-people{font-size:var(--fs-sm);color:var(--subtext);line-height:1.7}
.era-card-people strong{color:var(--text)}
.era-card-count{font-size:var(--fs-xs);color:var(--subtext)}
.era-card-prog{height:4px;background:#2a2a4a;border-radius:2px;overflow:hidden;margin-top:2px}
.era-card-prog-inner{height:100%;background:var(--green);border-radius:2px;transition:width .4s}

/* ══════════════════════
   PEOPLE
══════════════════════ */
#people-screen{max-width:1100px;margin:0 auto}
.people-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;
}
@media(min-width:600px){.people-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}}
@media(min-width:768px){.people-grid{grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}}
.person-card{
  background:var(--surface);border-radius:var(--radius);border:2px solid var(--card);
  padding:16px 12px;text-align:center;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s;
  position:relative;overflow:hidden;min-height:130px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
@media(min-width:768px){.person-card{padding:20px 14px;min-height:148px}}
.person-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow)}
.person-card:active{transform:scale(.97)}
.person-card.locked .person-emoji{filter:blur(4px) grayscale(1);opacity:.3}
.person-card.locked .person-name{color:var(--subtext)}
.person-card.unlocked{border-color:#2a5040}
.person-card.mastered{border-color:var(--gold);box-shadow:0 0 14px rgba(240,180,41,.25)}
.person-emoji{font-size:2.4rem;margin-bottom:5px;display:block}
@media(min-width:768px){.person-emoji{font-size:2.9rem}}
.person-name{font-size:.88rem;font-weight:800;margin-bottom:2px}
@media(min-width:768px){.person-name{font-size:.98rem}}
.person-kana{font-size:.66rem;color:var(--subtext)}
/* 理解度ゲージ */
.person-gauge-wrap{width:80%;height:4px;background:#2a2a4a;border-radius:2px;overflow:hidden;margin-top:6px}
.person-gauge{height:100%;border-radius:2px;transition:width .4s}
.person-era-tag{
  display:inline-block;font-size:.6rem;font-weight:700;
  padding:2px 7px;border-radius:8px;background:var(--card);color:var(--subtext);margin-top:4px;
}
.clear-badge{
  position:absolute;top:7px;right:7px;
  background:var(--gold);color:#12131a;
  font-size:.6rem;font-weight:900;padding:3px 6px;border-radius:8px;
}
.lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.7rem}

/* ══════════════════════
   QUIZ
══════════════════════ */
#quiz-screen{max-width:860px;margin:0 auto}
.quiz-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
}
@media(min-width:768px){.quiz-header{margin-bottom:20px}}
.quiz-person{font-size:1.05rem;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:8px}
@media(min-width:768px){.quiz-person{font-size:1.2rem}}
.quiz-right{display:flex;align-items:center;gap:10px}
.quiz-progress{display:flex;gap:7px;align-items:center}
.prog-dot{
  width:12px;height:12px;border-radius:50%;
  background:var(--card);border:2px solid var(--card);transition:all .3s;
}
@media(min-width:768px){.prog-dot{width:15px;height:15px}}
.prog-dot.done-correct{background:var(--green);border-color:var(--green)}
.prog-dot.done-wrong{background:var(--red);border-color:var(--red)}
.prog-dot.current{background:var(--accent);border-color:var(--accent);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
/* モード表示バッジ */
.quiz-mode-badge{
  font-size:.68rem;font-weight:800;padding:4px 10px;border-radius:12px;
}
.quiz-mode-badge.review{background:#8a5200;color:#ffd080}
.quiz-mode-badge.normal{background:var(--card);color:var(--subtext)}
/* レイアウト */
.quiz-layout{display:flex;flex-direction:column}
@media(min-width:768px){
  .quiz-layout{
    display:grid;grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto;gap:0 20px;align-items:start;
  }
  .question-card{grid-column:1;grid-row:1}
  #feedback-area{grid-column:1;grid-row:2}
  .choices{grid-column:2;grid-row:1 / span 2}
  #next-btn{grid-column:1 / span 2}
}
.question-card{
  background:var(--surface);border-radius:var(--radius);border:2px solid var(--card);
  padding:22px 20px;margin-bottom:14px;
  transition:border-color .3s;
}
.question-card.flash-correct{border-color:var(--green);box-shadow:0 0 20px rgba(74,222,128,.3)}
.question-card.flash-wrong{border-color:var(--red);box-shadow:0 0 20px rgba(248,113,113,.25)}
@media(min-width:768px){.question-card{padding:26px 24px;margin-bottom:16px}}
.question-num{font-size:var(--fs-xs);color:var(--subtext);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.question-text{font-size:1.06rem;font-weight:700;line-height:1.8}
@media(min-width:768px){.question-text{font-size:1.2rem;line-height:1.85}}
.choices{display:flex;flex-direction:column;gap:9px}
@media(min-width:768px){.choices{gap:11px}}
.choice-btn{
  background:var(--card);border:2px solid transparent;border-radius:14px;
  padding:14px 16px;text-align:left;cursor:pointer;
  font-size:var(--fs-base);font-weight:600;color:var(--text);
  transition:all .18s;display:flex;align-items:center;gap:10px;min-height:54px;
}
@media(min-width:768px){.choice-btn{padding:17px 20px;min-height:62px}}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:#1e2450}
.choice-btn:active:not(:disabled){transform:scale(.98)}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{background:#1a4a2a;border-color:var(--green);color:var(--green);animation:correctFlash .4s ease}
.choice-btn.wrong{background:#4a1a1a;border-color:var(--red);color:var(--red);animation:wrongShake .3s ease}
@keyframes correctFlash{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.choice-letter{
  width:28px;height:28px;border-radius:50%;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:900;flex-shrink:0;
}
@media(min-width:768px){.choice-letter{width:32px;height:32px}}
/* フィードバック */
.feedback-banner{
  border-radius:12px;padding:12px 16px;margin-bottom:12px;
  font-size:var(--fs-base);font-weight:800;text-align:center;
  animation:fadeInUp .25s ease;
}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.feedback-banner.correct{background:#1a4a2a;color:var(--green);border:2px solid var(--green)}
.feedback-banner.wrong{background:#4a1a1a;color:var(--red);border:2px solid var(--red)}
.feedback-banner.near-miss{background:#3a3a1a;color:var(--gold);border:2px solid var(--gold)}
#next-btn{width:100%;margin-top:10px}

/* ══════════════════════
   RESULT
══════════════════════ */
#result-screen{max-width:640px;margin:0 auto;text-align:center;padding-bottom:40px}
.result-hero{font-size:5rem;margin-bottom:8px;animation:heroIn .5s ease}
@keyframes heroIn{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-title{font-size:1.5rem;font-weight:900;margin-bottom:4px}
@media(min-width:768px){.result-title{font-size:1.9rem}}
.result-sub{font-size:var(--fs-sm);color:var(--subtext);margin-bottom:20px}
.result-stats{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:var(--surface);border-radius:var(--radius);border:2px solid var(--card);padding:14px 18px;min-width:96px}
@media(min-width:768px){.stat-box{padding:18px 26px;min-width:115px}}
.stat-val{font-size:1.8rem;font-weight:900;color:var(--gold)}
.stat-label{font-size:var(--fs-xs);color:var(--subtext)}
/* 解放バナー */
.unlock-banner{
  background:linear-gradient(135deg,#1e4a1e,#122e12);
  border:2px solid var(--green);border-radius:var(--radius);
  padding:16px;margin-bottom:20px;
  animation:unlockIn .6s ease;
}
@keyframes unlockIn{0%{opacity:0;transform:scale(.8)}70%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
.unlock-banner h3{color:var(--green);font-size:1.1rem;margin-bottom:4px}
.unlock-banner p{font-size:var(--fs-base)}
.near-miss-banner{background:#3a3a1a;border:2px solid var(--gold);border-radius:var(--radius);padding:14px;margin-bottom:18px;color:var(--gold);font-weight:700;font-size:var(--fs-base)}
/* 理解度サマリ */
.gauge-summary{
  background:var(--surface);border:2px solid var(--card);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:18px;text-align:left;
}
.gauge-summary-title{font-size:var(--fs-xs);color:var(--subtext);font-weight:700;letter-spacing:.08em;margin-bottom:10px}
.gauge-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.gauge-row:last-child{margin-bottom:0}
.gauge-label{font-size:var(--fs-sm);font-weight:700;min-width:80px}
.gauge-bar-wrap{flex:1;height:8px;background:#2a2a4a;border-radius:4px;overflow:hidden}
.gauge-bar{height:100%;border-radius:4px;transition:width .6s}
.gauge-pct{font-size:var(--fs-xs);color:var(--subtext);min-width:36px;text-align:right}
/* 復習ボタン */
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.review-hint{font-size:var(--fs-xs);color:var(--gold);margin-bottom:8px;font-weight:700}

/* ══════════════════════
   COLLECTION
══════════════════════ */
#collection-screen{max-width:1100px;margin:0 auto}
.coll-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.coll-title{font-size:1.15rem;font-weight:900;color:var(--gold)}
.coll-stats{display:flex;gap:12px;flex-wrap:wrap}
.coll-stat{background:var(--surface);border:1.5px solid var(--card);border-radius:10px;padding:7px 14px;text-align:center}
.coll-stat-val{font-size:1.15rem;font-weight:900;color:var(--gold)}
.coll-stat-label{font-size:.62rem;color:var(--subtext)}
.coll-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.coll-filter-btn{
  padding:6px 13px;border-radius:20px;border:1.5px solid var(--card);
  background:transparent;color:var(--subtext);cursor:pointer;
  font-size:var(--fs-sm);font-weight:700;transition:all .15s;min-height:36px;
}
.coll-filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.coll-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px;
}
@media(min-width:768px){.coll-grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}}
.coll-card{
  background:var(--surface);border-radius:var(--radius);border:2px solid var(--card);
  padding:14px 10px;text-align:center;position:relative;overflow:hidden;
  min-height:128px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
}
@media(min-width:768px){.coll-card{padding:18px 12px;min-height:148px}}
.coll-card.locked{opacity:.45}
.coll-card.unlocked{border-color:#2a5040;cursor:pointer}
.coll-card.unlocked:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.coll-card.mastered{border-color:var(--gold);box-shadow:0 0 14px rgba(240,180,41,.3);cursor:pointer}
.coll-emoji{font-size:2.3rem;display:block;margin-bottom:3px}
.coll-name{font-size:.86rem;font-weight:800}
.coll-kana{font-size:.64rem;color:var(--subtext)}
.coll-era{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:8px;background:var(--card);color:var(--subtext);margin-top:3px}
/* 理解度ゲージ（コレクション） */
.coll-gauge-wrap{width:75%;height:4px;background:#2a2a4a;border-radius:2px;overflow:hidden;margin-top:4px}
.coll-gauge{height:100%;border-radius:2px}
.coll-clear{position:absolute;top:7px;right:7px;background:var(--gold);color:#12131a;font-size:.6rem;font-weight:900;padding:2px 6px;border-radius:7px}
.coll-lock-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.7rem}

/* コレクション詳細モーダル */
#coll-modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.72);z-index:200;
  align-items:center;justify-content:center;padding:20px;
}
#coll-modal-bg.show{display:flex}
#coll-modal{
  background:var(--surface);border:2px solid var(--card);
  border-radius:var(--radius);padding:26px 22px;
  max-width:400px;width:100%;text-align:center;position:relative;
}
@media(min-width:768px){#coll-modal{padding:34px 30px}}
#coll-modal-close{
  position:absolute;top:10px;right:10px;
  background:var(--card);border:none;color:var(--subtext);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.95rem;
}
.modal-emoji{font-size:3.8rem;margin-bottom:6px;display:block}
.modal-name{font-size:1.35rem;font-weight:900;margin-bottom:2px}
.modal-kana{font-size:.78rem;color:var(--subtext);margin-bottom:5px}
.modal-era{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:10px;background:var(--card);color:var(--gold);margin-bottom:10px}
.modal-hint{font-size:var(--fs-sm);color:var(--subtext);line-height:1.8;margin-bottom:14px}
.modal-stats{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.modal-stat{background:var(--card);border-radius:10px;padding:9px 16px;min-width:75px}
.modal-stat-val{font-size:1.35rem;font-weight:900;color:var(--gold)}
.modal-stat-label{font-size:.62rem;color:var(--subtext)}
/* 理解度バー（モーダル） */
.modal-gauge-section{margin-bottom:16px;text-align:left}
.modal-gauge-label{font-size:var(--fs-xs);color:var(--subtext);margin-bottom:5px;font-weight:700}
.modal-gauge-bar-wrap{width:100%;height:8px;background:#2a2a4a;border-radius:4px;overflow:hidden}
.modal-gauge-bar{height:100%;border-radius:4px;transition:width .6s}
.modal-gauge-pct{font-size:var(--fs-sm);font-weight:900;color:var(--gold);margin-top:4px}
.modal-play-btn{width:100%}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--gold);color:#12131a;
  padding:11px 24px;border-radius:40px;
  font-weight:900;font-size:var(--fs-base);
  pointer-events:none;transition:transform .35s,opacity .35s;
  opacity:0;z-index:300;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* XP POPUP */
.xp-popup{
  position:fixed;font-size:1rem;font-weight:900;color:var(--gold);
  pointer-events:none;z-index:200;
  right:18px;top:60px;
  animation:floatUp .95s forwards;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}

/* 解放スプラッシュ */
#unlock-splash{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.8);z-index:400;
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
  text-align:center;padding:20px;
}
#unlock-splash.show{display:flex}
.splash-emoji{font-size:7rem;animation:splashBounce .6s ease}
@keyframes splashBounce{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.splash-title{font-size:2rem;font-weight:900;color:var(--gold)}
.splash-sub{font-size:1.1rem;color:var(--text)}
.splash-close{margin-top:8px}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <button id="back-btn" onclick="goBack()">◀</button>
    <h1 onclick="goTitle()">🔍 れきし探偵団</h1>

  <div id="hud">
    <div id="combo-display"></div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-val" id="hud-level">Lv.1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">XP</span>
      <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>
      <span class="hud-val" id="hud-xp" style="font-size:.68rem">0/100</span>

    <div class="hud-item">
      <span class="hud-label">解放</span>

  <!-- 1. TITLE -->

    <div class="title-icon">🏯</div>
    <div>
      <div class="title-h">れきし探偵団</div>
      <p class="title-sub">歴史上の人物42人をクイズで調べて<br>シルエットを解放しよう！</p>
    </div>
    <div class="title-start">
      <button class="btn btn-primary" style="font-size:1.15rem;padding:18px 52px" onclick="showMode()">▶ はじめる</button>
      <p id="daily-status"></p>
    </div>

  <!-- 2. MODE -->
  <div id="mode-screen" class="screen">
    <div class="mode-heading">どうやって選ぶ？</div>
    <div class="mode-cards">
      <div class="mode-card" onclick="showEra()">
        <div class="mode-card-icon">📅</div>
        <div class="mode-card-title">時代から選ぶ</div>
        <div class="mode-card-desc">古代・江戸・明治など<br>時代別に人物を探せる</div>
      </div>
      <div class="mode-card" onclick="showAllPeople()">
        <div class="mode-card-icon">📋</div>
        <div class="mode-card-title">一覧から選ぶ</div>
        <div class="mode-card-desc">42人を全部まとめて<br>一覧で見られる</div>
      </div>
    </div>
  </div>

  <!-- 3. ERA -->
  <div id="era-screen" class="screen">
    <div class="screen-heading">⏳ 時代を選ぼう</div>
    <div class="era-grid" id="era-grid"></div>
  </div>

  <!-- 4. PEOPLE -->
  <div id="people-screen" class="screen">
    <div class="screen-heading" id="people-heading">👤 人物を選ぼう</div>
    <div class="people-grid" id="people-grid"></div>
  </div>

  <!-- 5. QUIZ -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <div class="quiz-person">
        <span id="quiz-emoji"></span>
        <span id="quiz-person-name"></span>
      </div>
      <div class="quiz-right">
        <span class="quiz-mode-badge" id="quiz-mode-badge"></span>
        <div class="quiz-progress" id="quiz-progress"></div>
      </div>
    </div>
    <div class="quiz-layout">
      <div class="question-card" id="question-card">
        <div class="question-num" id="q-num"></div>
        <div class="question-text" id="q-text"></div>
      </div>
      <div id="feedback-area"></div>
      <div class="choices" id="choices"></div>
      <button class="btn btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">つぎへ →</button>
    </div>
  </div>

  <!-- 6. RESULT -->
  <div id="result-screen" class="screen">
    <div class="result-hero" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val" id="res-correct"></div><div class="stat-label">せいかい</div></div>
      <div class="stat-box"><div class="stat-val" id="res-xp"></div><div class="stat-label">かくとく XP</div></div>
      <div class="stat-box"><div class="stat-val" id="res-clear"></div><div class="stat-label">クリア回数</div></div>
    </div>
    <div id="gauge-summary-area"></div>
    <div id="unlock-area"></div>
    <div id="review-hint-area"></div>

  <!-- 7. COLLECTION -->
  <div id="collection-screen" class="screen">
    <div class="coll-header">
      <div class="coll-title">🏆 コレクション</div>
      <div class="coll-stats">
        <div class="coll-stat"><div class="coll-stat-val" id="coll-unlocked-count">0</div><div class="coll-stat-label">解放ずみ</div></div>
        <div class="coll-stat"><div class="coll-stat-val" id="coll-mastered-count">0</div><div class="coll-stat-label">マスター</div></div>
        <div class="coll-stat"><div class="coll-stat-val" id="coll-total-clear">0</div><div class="coll-stat-label">総クリア</div></div>
      </div>
    </div>

</div><!-- /main -->

<!-- 解放スプラッシュ -->
<div id="unlock-splash">
  <div class="splash-emoji" id="splash-emoji"></div>
  <div class="splash-title" id="splash-title"></div>
  <div class="splash-sub" id="splash-sub"></div>
  <button class="btn btn-primary splash-close" onclick="closeSplash()">やった！</button>
</div>

<!-- コレクション詳細モーダル -->
<div id="coll-modal-bg" onclick="closeModal(event)">
  <div id="coll-modal">
    <button id="coll-modal-close" onclick="closeModal()">✕</button>
    <span class="modal-emoji" id="modal-emoji"></span>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-kana" id="modal-kana"></div>
    <span class="modal-era" id="modal-era"></span>
    <div class="modal-hint" id="modal-hint"></div>
    <div class="modal-gauge-section">
      <div class="modal-gauge-label">理解度（正解率）</div>
      <div class="modal-gauge-bar-wrap"><div class="modal-gauge-bar" id="modal-gauge-bar"></div></div>
      <div class="modal-gauge-pct" id="modal-gauge-pct"></div>
    </div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val" id="modal-clear"></div><div class="modal-stat-label">クリア回数</div></div>
      <div class="modal-stat"><div class="modal-stat-val" id="modal-correct-rate"></div><div class="modal-stat-label">正解数</div></div>
    </div>
    <button class="btn btn-primary modal-play-btn" id="modal-play-btn">クイズに挑戦！</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  1. データ整合性チェック（起動時）
// ══════════════════════════════════════════
(function dataCheck(){
  const personIds   = new Set(PEOPLE.map(p=>p.id));
  const questionIds = new Set(QUESTIONS.map(q=>q.personId));
  const missing = [...personIds].filter(id=>!questionIds.has(id));
  if(missing.length) console.warn('[整合性チェック] 問題がない人物ID:', missing);
  const orphan = [...questionIds].filter(id=>!personIds.has(id));
  if(orphan.length) console.warn('[整合性チェック] 人物がいない問題personId:', orphan);
  // 問題数チェック
  PEOPLE.forEach(p=>{
    const cnt = QUESTIONS.filter(q=>q.personId===p.id).length;
    if(cnt < 5) console.warn(`[整合性チェック] ${p.name}(${p.id}) の問題が${cnt}問（5問未満）`);
  });
})();

// ══════════════════════════════════════════
//  2. SAVE / LOAD
// ══════════════════════════════════════════
const SAVE_KEY      = 'rekiDanSave_v3';
const XP_PER_LEVEL  = 100;
const CORRECT_XP    = 10;
const PERFECT_BONUS = 30;
const DAILY_XP      = 50;
const STREAK_BONUS  = 30;

// デフォルト
function def(){
  return {xp:0,level:1,people:{},lastLogin:null,streak:0};
}
let save = (()=>{
  try{ return JSON.parse(localStorage.getItem(SAVE_KEY))||def(); }
  catch(e){ return def(); }
})();

function persist(){ localStorage.setItem(SAVE_KEY,JSON.stringify(save)); }

// personSave: { cleared, unlocked, correct, total }
function personSave(id){
  if(!save.people[id]) save.people[id]={cleared:0,unlocked:false,correct:0,total:0};
  const p = save.people[id];
  if(p.correct===undefined) p.correct=0;
  if(p.total===undefined)   p.total=0;
  return p;
}

// ══════════════════════════════════════════
//  3. 選択肢シャッフル
// ══════════════════════════════════════════
function shuffleChoices(q){
  const arr = q.choices.map((c,i)=>({text:c, isCorrect:i===q.answer}));
  arr.sort(()=>Math.random()-.5);
  return {
    ...q,
    choices: arr.map(a=>a.text),
    answer:  arr.findIndex(a=>a.isCorrect)
  };
}

// ══════════════════════════════════════════
//  4. 音（Web Audio API）
// ══════════════════════════════════════════
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, vol=0.18){
  try{
    const ctx = getAudioCtx();
    if(ctx.state==='suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain= ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+duration);
  }catch(e){}
}
function soundCorrect(){
  playTone(660,'sine',.12,.2);
  setTimeout(()=>playTone(880,'sine',.15,.18),80);
  setTimeout(()=>playTone(1100,'sine',.2,.15),170);
}
function soundWrong(){
  playTone(200,'sawtooth',.06,.15);
  setTimeout(()=>playTone(150,'sawtooth',.18,.12),60);
}
function soundUnlock(){
  [440,550,660,880,1100].forEach((f,i)=>{
    setTimeout(()=>playTone(f,'sine',.22,.16),i*80);
  });
}
function soundCombo(){
  playTone(1320,'sine',.1,.15);
}

// ══════════════════════════════════════════
//  5. XP / LEVEL / COMBO
// ══════════════════════════════════════════
let comboCount = 0;

function addXP(amount){
  save.xp += amount;
  const newLv = Math.floor(save.xp/XP_PER_LEVEL)+1;
  if(newLv > save.level){
    save.level = newLv;
    showToast(`🎉 レベルアップ！ Lv.${save.level} になった！`);
  }
  persist(); updateHUD(); showXPPopup(amount);
}

function updateHUD(){
  document.getElementById('hud-level').textContent  = `Lv.${save.level}`;
  const xpIn = save.xp % XP_PER_LEVEL;
  document.getElementById('hud-xp').textContent     = `${xpIn}/${XP_PER_LEVEL}`;
  document.getElementById('xp-bar').style.width     = (xpIn/XP_PER_LEVEL*100)+'%';
  const ul = Object.values(save.people).filter(p=>p.unlocked).length;
  document.getElementById('hud-unlocked').textContent = `${ul}/42`;
}

function updateComboDisplay(){
  const el = document.getElementById('combo-display');
  if(comboCount>=2){
    el.textContent = `🔥 ${comboCount}コンボ！`;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

// ══════════════════════════════════════════
//  6. DAILY LOGIN
// ══════════════════════════════════════════
function checkDaily(){
  const today = new Date().toDateString();
  const el = document.getElementById('daily-status');
  if(save.lastLogin===today){
    el.textContent=`✅ 今日のボーナスずみ　ストリーク：${save.streak}日`;
    return;
  }
  const yesterday = new Date(Date.now()-86400000).toDateString();
  save.streak = (save.lastLogin===yesterday)?(save.streak||0)+1:1;
  save.lastLogin = today;
  let bonus=DAILY_XP, msg=`🎁 ログインボーナス +${DAILY_XP}XP！`;
  if(save.streak>=3){ bonus+=STREAK_BONUS; msg=`🔥 ${save.streak}日連続！ +${DAILY_XP+STREAK_BONUS}XP！`; }
  addXP(bonus); showToast(msg);
  el.textContent=`✅ ボーナスをもらった！　ストリーク：${save.streak}日`;
}

// ══════════════════════════════════════════
//  7. SCREEN / NAVIGATION
// ══════════════════════════════════════════
const ERA_ORDER=[...new Map(PEOPLE.map(p=>[p.era,true])).keys()];
let screenStack=[];

function showScreen(id, push=true){
  const prev=document.querySelector('.screen.active');
  if(push && prev) screenStack.push(prev.id);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('main').scrollTop=0;
  document.getElementById('back-btn').classList.toggle('show', id!=='title-screen');
}
function goBack(){
  if(!screenStack.length){ goTitle(); return; }
  const prev=screenStack.pop();
  showScreen(prev,false);
  if(prev==='people-screen') renderPeopleGrid();
  if(prev==='era-screen')    buildEraGrid();
  if(prev==='collection-screen') buildCollection();
}
function goTitle(){
  screenStack=[];
  comboCount=0; updateComboDisplay();
  checkDaily();
  showScreen('title-screen',false);
}
function showMode(){ showScreen('mode-screen'); }

// ══════════════════════════════════════════
//  8. ERA SELECT
// ══════════════════════════════════════════
function showEra(){ buildEraGrid(); showScreen('era-screen'); }
function buildEraGrid(){
  const grid=document.getElementById('era-grid');
  grid.innerHTML='';
  ERA_ORDER.forEach(era=>{
    const people=PEOPLE.filter(p=>p.era===era);
    if(!people.length) return;
    const cleared=people.filter(p=>personSave(p.id).unlocked).length;
    const pct=Math.round(cleared/people.length*100);
    const names=people.map(p=>{
      const ps=personSave(p.id);
      return ps.unlocked?`<strong>${p.name}</strong>`:'？？？';
    }).join('・');
    const card=document.createElement('div');
    card.className='era-card';
    card.innerHTML=`
      <div class="era-card-name">${era}時代</div>
      <div class="era-card-people">${names}</div>
      <div class="era-card-count">🔓 ${cleared}/${people.length}人 解放</div>
      <div class="era-card-prog"><div class="era-card-prog-inner" style="width:${pct}%"></div></div>
    `;
    card.onclick=()=>showPeopleByEra(era);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
//  9. PEOPLE
// ══════════════════════════════════════════
let currentPeopleFilter=null;

function showPeopleByEra(era){
  currentPeopleFilter=era;
  document.getElementById('people-heading').textContent=`⏳ ${era}時代の人物`;
  renderPeopleGrid(); showScreen('people-screen');
}
function showAllPeople(){
  currentPeopleFilter=null;
  document.getElementById('people-heading').textContent='👤 人物を選ぼう（全員）';
  renderPeopleGrid(); showScreen('people-screen');
}

// 理解度ゲージの色
function gaugeColor(pct){
  if(pct>=80) return var_green;
  if(pct>=50) return '#f0b429';
  return '#e8504a';
}
const var_green='#4ade80';

function renderPeopleGrid(){
  const list=currentPeopleFilter?PEOPLE.filter(p=>p.era===currentPeopleFilter):PEOPLE;
  const grid=document.getElementById('people-grid');
  grid.innerHTML='';
  list.forEach(p=>{
    const ps=personSave(p.id);
    const cnt=ps.cleared;
    const pct=ps.total>0?Math.round(ps.correct/ps.total*100):0;
    let cls='person-card';
    if(!ps.unlocked) cls+=' locked';
    else if(cnt>=5) cls+=' mastered';
    else cls+=' unlocked';
    const card=document.createElement('div');
    card.className=cls;
    if(cnt>=5) card.style.background='linear-gradient(135deg,#243010,#182008)';
    else if(cnt>=3) card.style.background='linear-gradient(135deg,#0e2440,#081830)';
    const gaugeHTML=ps.unlocked?`
      <div class="person-gauge-wrap">
        <div class="person-gauge" style="width:${pct}%;background:${gaugeColor(pct)}"></div>
      </div>
    `:'';
    card.innerHTML=`
      <span class="person-emoji">${p.emoji}</span>
      <div class="person-name">${ps.unlocked?p.name:'？？？？'}</div>
      <div class="person-kana">${ps.unlocked?p.kana:'\u3000'}</div>
      <span class="person-era-tag">${p.era}</span>
      ${gaugeHTML}
      ${cnt>0?`<div class="clear-badge">${cnt}回</div>`:''}
      ${!ps.unlocked?`<div class="lock-overlay">🔒</div>`:''}
    `;
    card.onclick=()=>startQuiz(p.id);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
//  10. QUIZ
// ══════════════════════════════════════════
let quizState={};

function startQuiz(personId, isReview=false, reviewQuestions=null){
  const person=PEOPLE.find(p=>p.id===personId);
  let questions;
  if(isReview && reviewQuestions){
    // 復習モード：間違えた問題をシャッフルして出す
    questions=reviewQuestions.map(q=>shuffleChoices(q)).sort(()=>Math.random()-.5);
  } else {
    const pool=QUESTIONS.filter(q=>q.personId===personId);
    questions=pool.sort(()=>Math.random()-.5).slice(0,Math.min(5,pool.length)).map(q=>shuffleChoices(q));
  }
  quizState={
    personId, person, questions,
    current:0, results:[], earnedXP:0, answered:false,
    wrongQuestions:[], // 間違えた問題を蓄積
    isReview
  };
  comboCount=0; updateComboDisplay();
  document.getElementById('quiz-emoji').textContent=person.emoji;
  document.getElementById('quiz-person-name').textContent=person.name;
  const badge=document.getElementById('quiz-mode-badge');
  if(isReview){
    badge.textContent='🔄 復習モード'; badge.className='quiz-mode-badge review';
  } else {
    badge.textContent=''; badge.className='quiz-mode-badge normal';
  }
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion(){
  const {questions,current,results}=quizState;
  const q=questions[current];
  // progress dots
  const prog=document.getElementById('quiz-progress');
  prog.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    let c='prog-dot';
    if(i<current) c+=results[i]?' done-correct':' done-wrong';
    else if(i===current) c+=' current';
    d.className=c; prog.appendChild(d);
  });
  document.getElementById('q-num').textContent=`第${current+1}問 / 全${questions.length}問`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('feedback-area').innerHTML='';
  document.getElementById('next-btn').style.display='none';
  // question-cardのフラッシュリセット
  const qCard=document.getElementById('question-card');
  qCard.classList.remove('flash-correct','flash-wrong');
  quizState.answered=false;
  // 選択肢（すでにshuffleChoices済み）
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  q.choices.forEach((text,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-letter">${letters[i]}</span>${text}`;
    btn.onclick=()=>answer(i===q.answer, btn, q, choicesEl);
    choicesEl.appendChild(btn);
  });
}

function answer(correct, clickedBtn, q, choicesEl){
  if(quizState.answered) return;
  quizState.answered=true;
  quizState.results.push(correct);

  // 理解度記録
  const ps=personSave(quizState.personId);
  ps.total++;
  if(correct) ps.correct++;
  persist();

  // 正解ボタンをハイライト
  const btns=choicesEl.querySelectorAll('.choice-btn');
  btns.forEach((btn,i)=>{ btn.disabled=true; if(i===q.answer) btn.classList.add('correct'); });
  if(!correct){ clickedBtn.classList.add('wrong'); quizState.wrongQuestions.push(q); }

  // カードフラッシュ
  const qCard=document.getElementById('question-card');
  qCard.classList.add(correct?'flash-correct':'flash-wrong');
  setTimeout(()=>qCard.classList.remove('flash-correct','flash-wrong'),600);

  // コンボ＆XP
  if(correct){
    comboCount++;
    updateComboDisplay();
    const comboBonus=comboCount>=3?Math.floor((comboCount-2)*5):0;
    const earned=CORRECT_XP+comboBonus;
    quizState.earnedXP+=earned;
    addXP(earned);
    soundCorrect();
    if(comboCount>=3) soundCombo();
  } else {
    comboCount=0; updateComboDisplay();
    soundWrong();
  }

  // フィードバックバナー
  const isLast=quizState.current===quizState.questions.length-1;
  const soFar=quizState.results.filter(Boolean).length;
  const fb=document.createElement('div');
  if(correct){
    const comboBonus=comboCount>=3?Math.floor((comboCount-2)*5):0;
    fb.className='feedback-banner correct';
    fb.textContent=comboCount>=3
      ?`⭕ 正解！ ${comboCount}コンボ！ +${CORRECT_XP+comboBonus}XP🔥`
      :`⭕ 正解！ +${CORRECT_XP}XP`;
  } else {
    const nearPerfect=soFar===quizState.questions.length-1&&isLast;
    fb.className='feedback-banner '+(nearPerfect?'near-miss':'wrong');
    fb.textContent=nearPerfect?'😣 おしい！あと1問で全問正解だった！':'❌ 不正解…';
  }
  document.getElementById('feedback-area').appendChild(fb);
  document.getElementById('next-btn').style.display='block';
  document.getElementById('next-btn').textContent=isLast?'結果を見る 🏁':'つぎへ →';
}

function nextQuestion(){
  quizState.current++;
  if(quizState.current>=quizState.questions.length) showResult();
  else renderQuestion();
}

// ══════════════════════════════════════════
//  11. RESULT
// ══════════════════════════════════════════
function showResult(){
  const {personId,person,questions,results,earnedXP,wrongQuestions,isReview}=quizState;
  const correct=results.filter(Boolean).length;
  const perfect=correct===questions.length;
  const ps=personSave(personId);
  let totalXP=earnedXP;
  let bonusMsg='';

  if(perfect && !isReview){
    totalXP+=PERFECT_BONUS; addXP(PERFECT_BONUS);
    bonusMsg=`🌟 全問正解ボーナス +${PERFECT_BONUS}XP！`;
    const wasUnlocked=ps.unlocked;
    ps.cleared++; ps.unlocked=true; persist();
    // 解放スプラッシュ（初回解放のみ）
    if(!wasUnlocked){
      setTimeout(()=>showSplash(person,'unlock'),400);
    } else if(ps.cleared===5){
      setTimeout(()=>showSplash(person,'master'),400);
    }
  } else if(!isReview) {
    persist();
  }

  // 基本表示
  document.getElementById('result-emoji').textContent=correct===5?'🏆':correct>=3?'⭐':'📖';
  document.getElementById('result-title').textContent=correct===5?'全問正解！！':correct>=3?'よくできました！':'もう一度挑戦！';
  document.getElementById('result-sub').textContent=bonusMsg||`${correct}/${questions.length} 正解`;
  document.getElementById('res-correct').textContent=`${correct}/${questions.length}`;
  document.getElementById('res-xp').textContent=`+${totalXP}`;
  document.getElementById('res-clear').textContent=`${ps.cleared}回`;

  // 理解度サマリ
  const pct=ps.total>0?Math.round(ps.correct/ps.total*100):0;
  const color=gaugeColor(pct);
  const star=pct>=80?'⭐⭐⭐':pct>=50?'⭐⭐':pct>=20?'⭐':'';
  document.getElementById('gauge-summary-area').innerHTML=`
    <div class="gauge-summary">
      <div class="gauge-summary-title">📊 ${person.name} の理解度</div>
      <div class="gauge-row">
        <div class="gauge-label">${star} ${pct}%</div>
        <div class="gauge-bar-wrap"><div class="gauge-bar" style="width:${pct}%;background:${color}"></div></div>
        <div class="gauge-pct">${ps.correct}/${ps.total}問</div>
      </div>
    </div>
  `;

  // 解放バナー
  const unlockEl=document.getElementById('unlock-area');
  if(perfect && !isReview){
    if(ps.cleared===1){
      unlockEl.innerHTML=`<div class="unlock-banner"><h3>🔓 解放！</h3><p>${person.emoji} <strong>${person.name}</strong> を解放した！</p></div>`;
    } else {
      const extra=ps.cleared===3?'✨ 背景が変わった！':ps.cleared===5?'🏆 マスター達成！':'';
      unlockEl.innerHTML=`<div class="unlock-banner"><h3>🌟 クリア！</h3><p>${person.emoji} <strong>${person.name}</strong> クリア${ps.cleared}回目！ ${extra}</p></div>`;
    }
  } else if(!perfect && !isReview && correct===questions.length-1 && !ps.unlocked){
    unlockEl.innerHTML=`<div class="near-miss-banner">😣 おしい！あと1問で解放できた！次がんばろう！</div>`;
  } else {
    unlockEl.innerHTML='';
  }

  // 復習モードへの案内
  const reviewArea=document.getElementById('review-hint-area');
  if(wrongQuestions.length>0 && !isReview){
    reviewArea.innerHTML=`<div class="review-hint">❌ ${wrongQuestions.length}問まちがえた→復習してみよう！</div>`;
  } else if(isReview && perfect){
    reviewArea.innerHTML=`<div class="review-hint">🎉 復習全問正解！完璧だ！</div>`;
  } else {
    reviewArea.innerHTML='';
  }

  // ボタン
  const btnsEl=document.getElementById('result-btns');
  btnsEl.innerHTML='';
  const again=document.createElement('button');
  again.className='btn btn-primary'; again.textContent='もう一度';
  again.onclick=()=>startQuiz(personId);
  btnsEl.appendChild(again);
  // 復習ボタン（間違いがある場合）
  if(wrongQuestions.length>0 && !isReview){
    const rev=document.createElement('button');
    rev.className='btn btn-review';
    rev.textContent=`🔄 まちがいを復習（${wrongQuestions.length}問）`;
    rev.onclick=()=>startQuiz(personId,true,wrongQuestions);
    btnsEl.appendChild(rev);
  }
  const back=document.createElement('button');
  back.className='btn btn-secondary'; back.textContent='ほかの人物へ';
  back.onclick=()=>goBack();
  btnsEl.appendChild(back);
  const coll=document.createElement('button');
  coll.className='btn btn-secondary'; coll.textContent='コレクションを見る';
  coll.onclick=()=>showCollection();
  btnsEl.appendChild(coll);

  showScreen('result-screen');
}

// ══════════════════════════════════════════
//  12. 解放スプラッシュ
// ══════════════════════════════════════════
function showSplash(person, type){
  soundUnlock();
  const splash=document.getElementById('unlock-splash');
  if(type==='unlock'){
    document.getElementById('splash-emoji').textContent=person.emoji;
    document.getElementById('splash-title').textContent=`${person.name} を解放！`;
    document.getElementById('splash-sub').textContent=`${person.kana}　${person.era}時代`;
  } else {
    document.getElementById('splash-emoji').textContent='🏆';
    document.getElementById('splash-title').textContent=`${person.name} マスター達成！`;
    document.getElementById('splash-sub').textContent='クリア5回達成！完璧だ！';
  }
  splash.classList.add('show');
}
function closeSplash(){
  document.getElementById('unlock-splash').classList.remove('show');
}

// ══════════════════════════════════════════
//  13. COLLECTION
// ══════════════════════════════════════════
let collFilter='すべて';
function showCollection(){ collFilter='すべて'; buildCollection(); showScreen('collection-screen'); }

function buildCollection(){
  const allPS=PEOPLE.map(p=>({p,ps:personSave(p.id)}));
  document.getElementById('coll-unlocked-count').textContent=allPS.filter(x=>x.ps.unlocked).length;
  document.getElementById('coll-mastered-count').textContent=allPS.filter(x=>x.ps.cleared>=5).length;
  document.getElementById('coll-total-clear').textContent=allPS.reduce((s,x)=>s+x.ps.cleared,0);

  // フィルター
  const filters=['すべて','解放ずみ','未解放',...ERA_ORDER];
  const filterEl=document.getElementById('coll-filter');
  filterEl.innerHTML='';
  filters.forEach(f=>{
    const btn=document.createElement('button');
    btn.className='coll-filter-btn'+(f===collFilter?' active':'');
    btn.textContent=f;
    btn.onclick=()=>{ collFilter=f; buildCollection(); };
    filterEl.appendChild(btn);
  });

  // グリッド
  let list=PEOPLE;
  if(collFilter==='解放ずみ') list=PEOPLE.filter(p=>personSave(p.id).unlocked);
  else if(collFilter==='未解放') list=PEOPLE.filter(p=>!personSave(p.id).unlocked);
  else if(collFilter!=='すべて') list=PEOPLE.filter(p=>p.era===collFilter);

  const grid=document.getElementById('coll-grid');
  grid.innerHTML='';
  list.forEach(p=>{
    const ps=personSave(p.id);
    const cnt=ps.cleared;
    const isU=ps.unlocked; const isM=cnt>=5;
    const pct=ps.total>0?Math.round(ps.correct/ps.total*100):0;
    const color=gaugeColor(pct);
    const card=document.createElement('div');
    card.className='coll-card '+(isM?'mastered':isU?'unlocked':'locked');
    if(isM) card.style.background='linear-gradient(135deg,#243010,#182008)';
    else if(cnt>=3) card.style.background='linear-gradient(135deg,#0e2440,#081830)';
    card.innerHTML=`
      <span class="coll-emoji">${p.emoji}</span>
      <div class="coll-name">${isU?p.name:'？？？？'}</div>
      <div class="coll-kana">${isU?p.kana:'\u3000'}</div>
      <span class="coll-era">${p.era}</span>
      ${isU?`<div class="coll-gauge-wrap"><div class="coll-gauge" style="width:${pct}%;background:${color}"></div></div>`:''}
      ${cnt>0?`<div class="coll-clear">${cnt}回</div>`:''}
      ${!isU?`<div class="coll-lock-icon">🔒</div>`:''}
    `;
    if(isU) card.onclick=()=>openModal(p.id);
    grid.appendChild(card);
  });
}

function openModal(personId){
  const p=PEOPLE.find(x=>x.id===personId);
  const ps=personSave(personId);
  const pct=ps.total>0?Math.round(ps.correct/ps.total*100):0;
  const color=gaugeColor(pct);
  document.getElementById('modal-emoji').textContent=p.emoji;
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-kana').textContent=p.kana;
  document.getElementById('modal-era').textContent=p.era+'時代';
  document.getElementById('modal-hint').textContent=p.hint;
  document.getElementById('modal-gauge-bar').style.cssText=`width:${pct}%;background:${color}`;
  document.getElementById('modal-gauge-pct').textContent=`${pct}%（${ps.correct}/${ps.total}問正解）`;
  document.getElementById('modal-clear').textContent=ps.cleared+'回';
  document.getElementById('modal-correct-rate').textContent=`${ps.correct}/${ps.total}`;
  document.getElementById('modal-play-btn').onclick=()=>{ closeModal(); startQuiz(personId); };
  document.getElementById('coll-modal-bg').classList.add('show');
}
function closeModal(e){
  if(e && e.target!==document.getElementById('coll-modal-bg') && e.target!==document.getElementById('coll-modal-close')) return;
  document.getElementById('coll-modal-bg').classList.remove('show');
}

// ══════════════════════════════════════════
//  14. TOAST / XP POPUP
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
function showXPPopup(amount){
  const el=document.createElement('div');
  el.className='xp-popup'; el.textContent=`+${amount}XP`;
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

// ══════════════════════════════════════════
updateHUD();
checkDaily();
</script>
