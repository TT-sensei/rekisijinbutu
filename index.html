<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>れきし探偵団</title>
<script src="people.js"></script>
<script src="questions.js"></script>
<style>
:root{
  --bg:#12131a; --surface:#1c1e2b; --card:#252840;
  --accent:#e8504a; --gold:#f0b429;
  --text:#eef2ff; --subtext:#7a86a0;
  --green:#4ade80; --red:#f87171;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --radius:16px;
  --fs-base:1rem; --fs-sm:.85rem; --fs-xs:.74rem;
  --pad:20px 20px 40px;
}
@media(min-width:768px){:root{--fs-base:1.08rem;--fs-sm:.92rem;--fs-xs:.8rem;--pad:28px 36px 52px}}
@media(min-width:1024px){:root{--fs-base:1.12rem;--fs-sm:.96rem;--fs-xs:.84rem;--pad:32px 52px 60px}}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  user-select:none;touch-action:manipulation;
}

/* ══ HEADER ══ */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:var(--surface);border-bottom:2px solid var(--card);
  flex-shrink:0;gap:12px;
}
@media(min-width:768px){#header{padding:14px 36px}}
#header-left{display:flex;align-items:center;gap:12px}
#back-btn{
  display:none;
  background:var(--card);border:none;color:var(--text);
  width:36px;height:36px;border-radius:10px;cursor:pointer;
  font-size:1.2rem;align-items:center;justify-content:center;
  flex-shrink:0;
}
#back-btn.show{display:flex}
#header h1{
  font-size:1.2rem;font-weight:900;letter-spacing:.05em;
  color:var(--gold);cursor:pointer;white-space:nowrap;
}
@media(min-width:768px){#header h1{font-size:1.4rem}}
#hud{display:flex;gap:14px;align-items:center}
@media(min-width:768px){#hud{gap:22px}}
.hud-item{display:flex;flex-direction:column;align-items:center;line-height:1.2}
.hud-label{font-size:.58rem;color:var(--subtext);letter-spacing:.08em}
.hud-val{font-size:.9rem;font-weight:800;color:var(--text)}
#xp-bar-wrap{width:80px;height:6px;background:#2a2a4a;border-radius:3px;overflow:hidden;margin-top:3px}
@media(min-width:768px){#xp-bar-wrap{width:110px;height:7px}}
#xp-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;transition:width .4s}
#collection-btn{
  background:var(--card);border:1.5px solid #353860;
  color:var(--text);padding:7px 14px;border-radius:20px;
  cursor:pointer;font-size:var(--fs-xs);font-weight:700;
  white-space:nowrap;min-height:36px;
  display:flex;align-items:center;gap:5px;
}
@media(min-width:768px){#collection-btn{padding:8px 18px;font-size:var(--fs-sm)}}

/* ══ MAIN ══ */
#main{flex:1;overflow-y:auto;padding:var(--pad)}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:var(--card);border-radius:3px}

.screen{display:none}
.screen.active{display:block}

/* ── ボタン共通 ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 32px;border-radius:40px;border:none;cursor:pointer;
  font-size:var(--fs-base);font-weight:800;letter-spacing:.04em;
  transition:transform .15s,box-shadow .15s;min-height:52px;
}
@media(min-width:768px){.btn{padding:16px 44px;min-height:56px}}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;box-shadow:0 4px 20px rgba(232,80,74,.4)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(232,80,74,.6)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid #353860}

/* ══════════════════════════════
   1. TITLE SCREEN
══════════════════════════════ */
#title-screen{
  max-width:560px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;
  gap:32px;padding-top:16px;text-align:center;
}
.title-icon{font-size:5rem;line-height:1}
@media(min-width:768px){.title-icon{font-size:6.5rem}}
.title-h{font-size:2.6rem;font-weight:900;color:var(--gold);text-shadow:0 0 32px rgba(240,180,41,.35);line-height:1.15}
@media(min-width:768px){.title-h{font-size:3.2rem}}
.title-sub{font-size:var(--fs-sm);color:var(--subtext);line-height:1.9}

/* はじめるボタン＋ボーナス表示 */
.title-start{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
#daily-status{font-size:var(--fs-xs);color:var(--subtext)}

/* ══════════════════════════════
   2. MODE SELECT SCREEN
══════════════════════════════ */
#mode-screen{
  max-width:640px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.mode-heading{font-size:1.1rem;font-weight:900;color:var(--gold);text-align:center;margin-bottom:4px}
@media(min-width:768px){.mode-heading{font-size:1.3rem}}
.mode-cards{display:flex;flex-direction:column;gap:16px;width:100%}
@media(min-width:560px){.mode-cards{flex-direction:row}}
.mode-card{
  flex:1;background:var(--surface);border:2px solid var(--card);
  border-radius:var(--radius);padding:28px 20px;
  text-align:center;cursor:pointer;
  transition:border-color .15s,transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.mode-card:hover,.mode-card:active{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.mode-card-icon{font-size:3rem}
@media(min-width:768px){.mode-card-icon{font-size:3.8rem}}
.mode-card-title{font-size:1.15rem;font-weight:900;color:var(--text)}
@media(min-width:768px){.mode-card-title{font-size:1.3rem}}
.mode-card-desc{font-size:var(--fs-sm);color:var(--subtext);line-height:1.7}

/* ══════════════════════════════
   3. ERA SELECT SCREEN
══════════════════════════════ */
#era-screen{max-width:800px;margin:0 auto}
.screen-heading{
  font-size:1.1rem;font-weight:900;color:var(--gold);
  margin-bottom:20px;
}
@media(min-width:768px){.screen-heading{font-size:1.3rem;margin-bottom:24px}}
.era-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}
@media(min-width:768px){.era-grid{gap:16px}}
.era-card{
  background:var(--surface);border:2px solid var(--card);
  border-radius:var(--radius);padding:20px 18px;
  cursor:pointer;
  transition:border-color .15s,transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;gap:8px;
  min-height:90px;
}
@media(min-width:768px){.era-card{padding:24px 22px;min-height:110px}}
.era-card:hover,.era-card:active{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.era-card-name{font-size:1.2rem;font-weight:900;color:var(--gold)}
@media(min-width:768px){.era-card-name{font-size:1.4rem}}
.era-card-people{font-size:var(--fs-sm);color:var(--subtext);line-height:1.7}
.era-card-people strong{color:var(--text)}
.era-card-count{
  font-size:var(--fs-xs);color:var(--subtext);
  display:flex;align-items:center;gap:4px;margin-top:2px;
}
.era-card-prog{
  height:4px;background:#2a2a4a;border-radius:2px;overflow:hidden;margin-top:2px;
}
.era-card-prog-inner{height:100%;background:var(--green);border-radius:2px;transition:width .4s}

/* ══════════════════════════════
   4. PEOPLE SCREEN
══════════════════════════════ */
#people-screen{max-width:1100px;margin:0 auto}
.people-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px;
}
@media(min-width:600px){.people-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}}
@media(min-width:768px){.people-grid{grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}}
@media(min-width:1024px){.people-grid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:16px}}
.person-card{
  background:var(--surface);border-radius:var(--radius);
  border:2px solid var(--card);
  padding:16px 12px;text-align:center;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s;
  position:relative;overflow:hidden;
  min-height:130px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
@media(min-width:768px){.person-card{padding:20px 14px;min-height:150px}}
.person-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow)}
.person-card:active{transform:scale(.97)}
.person-card.locked .person-emoji{filter:blur(4px) grayscale(1);opacity:.3}
.person-card.locked .person-name{color:var(--subtext)}
.person-card.unlocked{border-color:#2a5040}
.person-card.mastered{border-color:var(--gold);box-shadow:0 0 14px rgba(240,180,41,.25)}
.person-emoji{font-size:2.5rem;margin-bottom:6px;display:block}
@media(min-width:768px){.person-emoji{font-size:3rem;margin-bottom:8px}}
.person-name{font-size:.9rem;font-weight:800;margin-bottom:2px}
@media(min-width:768px){.person-name{font-size:1rem}}
.person-kana{font-size:.68rem;color:var(--subtext)}
.person-era-tag{
  display:inline-block;font-size:.62rem;font-weight:700;
  padding:2px 8px;border-radius:8px;background:var(--card);color:var(--subtext);margin-top:6px;
}
.clear-badge{
  position:absolute;top:8px;right:8px;
  background:var(--gold);color:#12131a;
  font-size:.62rem;font-weight:900;padding:3px 7px;border-radius:8px;
}
.lock-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;
}

/* ══════════════════════════════
   5. QUIZ SCREEN
══════════════════════════════ */
#quiz-screen{max-width:860px;margin:0 auto}
.quiz-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;
}
@media(min-width:768px){.quiz-header{margin-bottom:24px}}
.quiz-person{font-size:1.05rem;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:8px}
@media(min-width:768px){.quiz-person{font-size:1.25rem}}
.quiz-progress{display:flex;gap:8px;align-items:center}
.prog-dot{
  width:13px;height:13px;border-radius:50%;
  background:var(--card);border:2px solid var(--card);transition:all .3s;
}
@media(min-width:768px){.prog-dot{width:16px;height:16px}}
.prog-dot.done-correct{background:var(--green);border-color:var(--green)}
.prog-dot.done-wrong{background:var(--red);border-color:var(--red)}
.prog-dot.current{background:var(--accent);border-color:var(--accent);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.quiz-layout{display:flex;flex-direction:column;gap:0}
@media(min-width:768px){
  .quiz-layout{
    display:grid;grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto;gap:0 20px;align-items:start;
  }
  .question-card{grid-column:1;grid-row:1}
  #feedback-area{grid-column:1;grid-row:2}
  .choices{grid-column:2;grid-row:1 / span 2}
  #next-btn{grid-column:1 / span 2}
}
.question-card{
  background:var(--surface);border-radius:var(--radius);border:2px solid var(--card);
  padding:22px 20px;margin-bottom:16px;
}
@media(min-width:768px){.question-card{padding:28px 26px;margin-bottom:16px}}
.question-num{font-size:var(--fs-xs);color:var(--subtext);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.question-text{font-size:1.08rem;font-weight:700;line-height:1.8}
@media(min-width:768px){.question-text{font-size:1.22rem;line-height:1.85}}
.choices{display:flex;flex-direction:column;gap:9px}
@media(min-width:768px){.choices{gap:12px}}
.choice-btn{
  background:var(--card);border:2px solid transparent;border-radius:14px;
  padding:15px 18px;text-align:left;cursor:pointer;
  font-size:var(--fs-base);font-weight:600;color:var(--text);
  transition:all .18s;display:flex;align-items:center;gap:10px;min-height:56px;
}
@media(min-width:768px){.choice-btn{padding:18px 22px;min-height:64px}}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:#1e2450}
.choice-btn:active:not(:disabled){transform:scale(.98)}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{background:#1a4a2a;border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:#4a1a1a;border-color:var(--red);color:var(--red)}
.choice-letter{
  width:30px;height:30px;border-radius:50%;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:900;flex-shrink:0;
}
@media(min-width:768px){.choice-letter{width:34px;height:34px}}
.feedback-banner{
  border-radius:12px;padding:13px 18px;margin-bottom:14px;
  font-size:var(--fs-base);font-weight:800;text-align:center;
}
.feedback-banner.correct{background:#1a4a2a;color:var(--green);border:2px solid var(--green)}
.feedback-banner.wrong{background:#4a1a1a;color:var(--red);border:2px solid var(--red)}
.feedback-banner.near-miss{background:#3a3a1a;color:var(--gold);border:2px solid var(--gold)}
#next-btn{width:100%;margin-top:12px}

/* ══════════════════════════════
   6. RESULT SCREEN
══════════════════════════════ */
#result-screen{max-width:640px;margin:0 auto;text-align:center;padding-bottom:40px}
.result-hero{font-size:5rem;margin-bottom:8px}
@media(min-width:768px){.result-hero{font-size:6rem}}
.result-title{font-size:1.5rem;font-weight:900;margin-bottom:4px}
@media(min-width:768px){.result-title{font-size:1.9rem}}
.result-sub{font-size:var(--fs-sm);color:var(--subtext);margin-bottom:22px}
.result-stats{display:flex;justify-content:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.stat-box{
  background:var(--surface);border-radius:var(--radius);border:2px solid var(--card);
  padding:16px 22px;min-width:100px;
}
@media(min-width:768px){.stat-box{padding:20px 30px;min-width:120px}}
.stat-val{font-size:1.9rem;font-weight:900;color:var(--gold)}
@media(min-width:768px){.stat-val{font-size:2.3rem}}
.stat-label{font-size:var(--fs-xs);color:var(--subtext)}
.unlock-banner{
  background:linear-gradient(135deg,#1e4a1e,#122e12);
  border:2px solid var(--green);border-radius:var(--radius);
  padding:18px;margin-bottom:22px;
}
.unlock-banner h3{color:var(--green);font-size:1.15rem;margin-bottom:4px}
@media(min-width:768px){.unlock-banner h3{font-size:1.35rem}}
.unlock-banner p{color:var(--text);font-size:var(--fs-base)}
.near-miss-banner{
  background:#3a3a1a;border:2px solid var(--gold);border-radius:var(--radius);
  padding:14px;margin-bottom:18px;color:var(--gold);font-weight:700;font-size:var(--fs-base);
}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ══════════════════════════════
   7. COLLECTION SCREEN
══════════════════════════════ */
#collection-screen{max-width:1100px;margin:0 auto}
.coll-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:10px;
}
.coll-title{font-size:1.2rem;font-weight:900;color:var(--gold)}
@media(min-width:768px){.coll-title{font-size:1.4rem}}
.coll-stats{
  display:flex;gap:16px;flex-wrap:wrap;
}
.coll-stat{
  background:var(--surface);border:1.5px solid var(--card);
  border-radius:10px;padding:8px 16px;text-align:center;
}
.coll-stat-val{font-size:1.2rem;font-weight:900;color:var(--gold)}
.coll-stat-label{font-size:.65rem;color:var(--subtext)}

/* コレクションフィルター */
.coll-filter{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.coll-filter-btn{
  padding:6px 14px;border-radius:20px;border:1.5px solid var(--card);
  background:transparent;color:var(--subtext);cursor:pointer;
  font-size:var(--fs-sm);font-weight:700;transition:all .15s;min-height:38px;
}
.coll-filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* コレクショングリッド */
.coll-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}
@media(min-width:768px){.coll-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}}
.coll-card{
  background:var(--surface);border-radius:var(--radius);
  border:2px solid var(--card);
  padding:16px 12px;text-align:center;
  position:relative;overflow:hidden;
  min-height:130px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
}
@media(min-width:768px){.coll-card{padding:20px 14px;min-height:150px}}
/* 未解放 */
.coll-card.locked{opacity:.5;cursor:default}
.coll-card.locked .coll-emoji{filter:blur(5px) grayscale(1)}
/* 解放済み */
.coll-card.unlocked{border-color:#2a5040;cursor:pointer}
.coll-card.unlocked:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
/* マスター */
.coll-card.mastered{border-color:var(--gold);box-shadow:0 0 14px rgba(240,180,41,.3);cursor:pointer}
.coll-emoji{font-size:2.4rem;display:block;margin-bottom:4px}
@media(min-width:768px){.coll-emoji{font-size:2.9rem}}
.coll-name{font-size:.88rem;font-weight:800}
@media(min-width:768px){.coll-name{font-size:.98rem}}
.coll-kana{font-size:.66rem;color:var(--subtext)}
.coll-era{
  font-size:.6rem;font-weight:700;
  padding:2px 7px;border-radius:8px;background:var(--card);color:var(--subtext);margin-top:4px;
}
.coll-clear{
  position:absolute;top:7px;right:7px;
  background:var(--gold);color:#12131a;
  font-size:.62rem;font-weight:900;padding:3px 7px;border-radius:8px;
}
.coll-lock-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
/* 星マスター表示 */
.coll-stars{display:flex;gap:2px;margin-top:2px}
.coll-star{font-size:.7rem}

/* コレクション詳細モーダル */
#coll-modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:200;
  align-items:center;justify-content:center;padding:20px;
}
#coll-modal-bg.show{display:flex}
#coll-modal{
  background:var(--surface);border:2px solid var(--card);
  border-radius:var(--radius);padding:28px 24px;
  max-width:420px;width:100%;text-align:center;
  position:relative;
}
@media(min-width:768px){#coll-modal{padding:36px 32px}}
#coll-modal-close{
  position:absolute;top:12px;right:12px;
  background:var(--card);border:none;color:var(--subtext);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;
}
.modal-emoji{font-size:4rem;margin-bottom:8px;display:block}
.modal-name{font-size:1.4rem;font-weight:900;margin-bottom:2px}
.modal-kana{font-size:.8rem;color:var(--subtext);margin-bottom:6px}
.modal-era{
  display:inline-block;font-size:.72rem;font-weight:700;
  padding:3px 10px;border-radius:10px;background:var(--card);color:var(--gold);margin-bottom:12px;
}
.modal-hint{font-size:var(--fs-sm);color:var(--subtext);line-height:1.8;margin-bottom:16px}
.modal-stats{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.modal-stat{background:var(--card);border-radius:10px;padding:10px 18px;min-width:80px}
.modal-stat-val{font-size:1.4rem;font-weight:900;color:var(--gold)}
.modal-stat-label{font-size:.64rem;color:var(--subtext)}
.modal-play-btn{width:100%}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--gold);color:#12131a;
  padding:11px 26px;border-radius:40px;
  font-weight:900;font-size:var(--fs-base);
  pointer-events:none;transition:transform .35s,opacity .35s;
  opacity:0;z-index:300;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ══ XP POPUP ══ */
.xp-popup{
  position:fixed;font-size:1.1rem;font-weight:900;color:var(--gold);
  pointer-events:none;z-index:200;
  right:20px;top:62px;
  animation:floatUp 1s forwards;
}
@media(min-width:768px){.xp-popup{right:40px;top:72px}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <button id="back-btn" onclick="goBack()">◀</button>
    <h1 onclick="goTitle()">🔍 れきし探偵団</h1>
  </div>
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-val" id="hud-level">Lv.1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">XP</span>
      <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>
      <span class="hud-val" id="hud-xp" style="font-size:.7rem">0/100</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">解放</span>
      <span class="hud-val" id="hud-unlocked">0/42</span>
    </div>
    <button id="collection-btn" onclick="showCollection()">🏆 コレクション</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- 1. TITLE -->
  <div id="title-screen" class="screen active">
    <div class="title-icon">🏯</div>
    <div>
      <div class="title-h">れきし探偵団</div>
      <p class="title-sub">歴史上の人物42人を<br>クイズで調べてシルエットを解放しよう！</p>
    </div>
    <div class="title-start">
      <button class="btn btn-primary" style="font-size:1.2rem;padding:18px 56px" onclick="showMode()">▶ はじめる</button>
      <p id="daily-status"></p>
    </div>
  </div>

  <!-- 2. MODE SELECT -->
  <div id="mode-screen" class="screen">
    <div class="mode-heading">どうやって選ぶ？</div>
    <div class="mode-cards">
      <div class="mode-card" onclick="showEra()">
        <div class="mode-card-icon">📅</div>
        <div class="mode-card-title">時代から選ぶ</div>
        <div class="mode-card-desc">古代・江戸・明治など<br>時代別に人物を探せる</div>
      </div>
      <div class="mode-card" onclick="showAllPeople()">
        <div class="mode-card-icon">📋</div>
        <div class="mode-card-title">一覧から選ぶ</div>
        <div class="mode-card-desc">42人を全部まとめて<br>一覧で見られる</div>
      </div>
    </div>
  </div>

  <!-- 3. ERA SELECT -->
  <div id="era-screen" class="screen">
    <div class="screen-heading">⏳ 時代を選ぼう</div>
    <div class="era-grid" id="era-grid"></div>
  </div>

  <!-- 4. PEOPLE (時代絞り込み or 全員) -->
  <div id="people-screen" class="screen">
    <div class="screen-heading" id="people-heading">👤 人物を選ぼう</div>
    <div class="people-grid" id="people-grid"></div>
  </div>

  <!-- 5. QUIZ -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <div class="quiz-person">
        <span id="quiz-emoji"></span>
        <span id="quiz-person-name"></span>
      </div>
      <div class="quiz-progress" id="quiz-progress"></div>
    </div>
    <div class="quiz-layout">
      <div class="question-card">
        <div class="question-num" id="q-num"></div>
        <div class="question-text" id="q-text"></div>
      </div>
      <div id="feedback-area"></div>
      <div class="choices" id="choices"></div>
      <button class="btn btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">つぎへ →</button>
    </div>
  </div>

  <!-- 6. RESULT -->
  <div id="result-screen" class="screen">
    <div class="result-hero" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val" id="res-correct"></div><div class="stat-label">せいかい</div></div>
      <div class="stat-box"><div class="stat-val" id="res-xp"></div><div class="stat-label">かくとく XP</div></div>
      <div class="stat-box"><div class="stat-val" id="res-clear"></div><div class="stat-label">クリア回数</div></div>
    </div>
    <div id="unlock-area"></div>
    <div class="result-btns">
      <button class="btn btn-primary" onclick="playAgain()">もう一度</button>
      <button class="btn btn-secondary" onclick="goBack()">ほかの人物へ</button>
      <button class="btn btn-secondary" onclick="showCollection()">コレクションを見る</button>
    </div>
  </div>

  <!-- 7. COLLECTION -->
  <div id="collection-screen" class="screen">
    <div class="coll-header">
      <div class="coll-title">🏆 コレクション</div>
      <div class="coll-stats">
        <div class="coll-stat">
          <div class="coll-stat-val" id="coll-unlocked-count">0</div>
          <div class="coll-stat-label">解放ずみ</div>
        </div>
        <div class="coll-stat">
          <div class="coll-stat-val" id="coll-mastered-count">0</div>
          <div class="coll-stat-label">マスター</div>
        </div>
        <div class="coll-stat">
          <div class="coll-stat-val" id="coll-total-clear">0</div>
          <div class="coll-stat-label">総クリア回数</div>
        </div>
      </div>
    </div>
    <div class="coll-filter" id="coll-filter"></div>
    <div class="coll-grid" id="coll-grid"></div>
  </div>

</div><!-- /main -->

<!-- COLLECTION MODAL -->
<div id="coll-modal-bg" onclick="closeModal(event)">
  <div id="coll-modal">
    <button id="coll-modal-close" onclick="closeModal()">✕</button>
    <span class="modal-emoji" id="modal-emoji"></span>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-kana" id="modal-kana"></div>
    <span class="modal-era" id="modal-era"></span>
    <div class="modal-hint" id="modal-hint"></div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-clear"></div>
        <div class="modal-stat-label">クリア回数</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-questions"></div>
        <div class="modal-stat-label">問題数</div>
      </div>
    </div>
    <button class="btn btn-primary modal-play-btn" id="modal-play-btn">クイズに挑戦！</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  SAVE / LOAD
// ══════════════════════════════════════════
const SAVE_KEY     = 'rekiDanSave_v2';
const XP_PER_LEVEL = 100;
const CORRECT_XP   = 10;
const PERFECT_BONUS = 30;
const DAILY_XP     = 50;
const STREAK_BONUS = 30;

let save = (() => {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || def(); }
  catch(e){ return def(); }
})();

function def(){ return {xp:0,level:1,people:{},lastLogin:null,streak:0}; }
function persist(){ localStorage.setItem(SAVE_KEY,JSON.stringify(save)); }
function personSave(id){
  if(!save.people[id]) save.people[id]={cleared:0,unlocked:false};
  return save.people[id];
}

// ══════════════════════════════════════════
//  XP / LEVEL
// ══════════════════════════════════════════
function addXP(amount){
  save.xp += amount;
  const newLv = Math.floor(save.xp/XP_PER_LEVEL)+1;
  if(newLv > save.level){ save.level=newLv; showToast(`🎉 レベルアップ！ Lv.${save.level} になった！`); }
  persist(); updateHUD(); showXPPopup(amount);
}
function updateHUD(){
  document.getElementById('hud-level').textContent = `Lv.${save.level}`;
  const xpIn = save.xp % XP_PER_LEVEL;
  document.getElementById('hud-xp').textContent = `${xpIn}/${XP_PER_LEVEL}`;
  document.getElementById('xp-bar').style.width = (xpIn/XP_PER_LEVEL*100)+'%';
  const ul = Object.values(save.people).filter(p=>p.unlocked).length;
  document.getElementById('hud-unlocked').textContent = `${ul}/42`;
}

// ══════════════════════════════════════════
//  DAILY LOGIN
// ══════════════════════════════════════════
function checkDaily(){
  const today = new Date().toDateString();
  const el = document.getElementById('daily-status');
  if(save.lastLogin===today){
    el.textContent = `✅ 今日のボーナスずみ　ストリーク：${save.streak}日`;
    return;
  }
  const yesterday = new Date(Date.now()-86400000).toDateString();
  save.streak = (save.lastLogin===yesterday) ? (save.streak||0)+1 : 1;
  save.lastLogin = today;
  let bonus = DAILY_XP;
  let msg = `🎁 ログインボーナス +${DAILY_XP}XP！`;
  if(save.streak>=3){ bonus+=STREAK_BONUS; msg=`🔥 ${save.streak}日連続！ +${DAILY_XP+STREAK_BONUS}XP！`; }
  addXP(bonus);
  showToast(msg);
  el.textContent = `✅ ボーナスをもらった！　ストリーク：${save.streak}日`;
}

// ══════════════════════════════════════════
//  SCREEN / NAVIGATION
// ══════════════════════════════════════════
const ERA_ORDER = ['古代','奈良','平安','鎌倉','室町','安土桃山','江戸','江戸末期','明治'];

let screenStack = []; // 戻るボタン用スタック

function showScreen(id, pushStack=true){
  const prev = document.querySelector('.screen.active');
  if(pushStack && prev) screenStack.push(prev.id);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('main').scrollTop = 0;
  // 戻るボタン表示制御
  document.getElementById('back-btn').classList.toggle('show', id!=='title-screen');
}

function goBack(){
  if(screenStack.length===0){ goTitle(); return; }
  const prev = screenStack.pop();
  showScreen(prev, false);
  // 人物一覧の場合は再描画
  if(prev==='people-screen') renderPeopleGrid();
  if(prev==='era-screen') buildEraGrid();
  if(prev==='collection-screen') buildCollection();
}

function goTitle(){
  screenStack = [];
  checkDaily();
  showScreen('title-screen', false);
}

function showMode(){
  showScreen('mode-screen');
}

// ══════════════════════════════════════════
//  ERA SELECT
// ══════════════════════════════════════════
function showEra(){
  buildEraGrid();
  showScreen('era-screen');
}

function buildEraGrid(){
  const grid = document.getElementById('era-grid');
  grid.innerHTML = '';
  ERA_ORDER.forEach(era=>{
    const people = PEOPLE.filter(p=>p.era===era);
    if(!people.length) return;
    const cleared = people.filter(p=>personSave(p.id).unlocked).length;
    const pct = Math.round(cleared/people.length*100);

    const names = people.map(p=>{
      const ps = personSave(p.id);
      return ps.unlocked ? `<strong>${p.name}</strong>` : '？？？';
    }).join('・');

    const card = document.createElement('div');
    card.className = 'era-card';
    card.innerHTML = `
      <div class="era-card-name">${era}時代</div>
      <div class="era-card-people">${names}</div>
      <div class="era-card-count">🔓 ${cleared}/${people.length}人 解放</div>
      <div class="era-card-prog"><div class="era-card-prog-inner" style="width:${pct}%"></div></div>
    `;
    card.onclick = ()=> showPeopleByEra(era);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
//  PEOPLE LIST
// ══════════════════════════════════════════
let currentPeopleFilter = null; // null=全員, string=時代名

function showPeopleByEra(era){
  currentPeopleFilter = era;
  document.getElementById('people-heading').textContent = `⏳ ${era}時代の人物`;
  renderPeopleGrid();
  showScreen('people-screen');
}

function showAllPeople(){
  currentPeopleFilter = null;
  document.getElementById('people-heading').textContent = '👤 人物を選ぼう（全員）';
  renderPeopleGrid();
  showScreen('people-screen');
}

function renderPeopleGrid(){
  const list = currentPeopleFilter
    ? PEOPLE.filter(p=>p.era===currentPeopleFilter)
    : PEOPLE;

  const grid = document.getElementById('people-grid');
  grid.innerHTML = '';
  list.forEach(p=>{
    const ps = personSave(p.id);
    const cnt = ps.cleared;
    let cls = 'person-card';
    if(!ps.unlocked) cls+=' locked';
    else if(cnt>=5) cls+=' mastered';
    else cls+=' unlocked';

    const card = document.createElement('div');
    card.className = cls;
    if(cnt>=5) card.style.background='linear-gradient(135deg,#243010,#182008)';
    else if(cnt>=3) card.style.background='linear-gradient(135deg,#0e2440,#081830)';

    card.innerHTML = `
      <span class="person-emoji">${p.emoji}</span>
      <div class="person-name">${ps.unlocked?p.name:'？？？？'}</div>
      <div class="person-kana">${ps.unlocked?p.kana:'\u3000'}</div>
      <span class="person-era-tag">${p.era}</span>
      ${cnt>0?`<div class="clear-badge">${cnt}回</div>`:''}
      ${!ps.unlocked?`<div class="lock-overlay">🔒</div>`:''}
    `;
    card.onclick = ()=> startQuiz(p.id);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════
let quizState = {};

function startQuiz(personId){
  const person = PEOPLE.find(p=>p.id===personId);
  const pool = QUESTIONS.filter(q=>q.personId===personId);
  const questions = [...pool].sort(()=>Math.random()-.5).slice(0,Math.min(5,pool.length));
  quizState = {personId,person,questions,current:0,results:[],earnedXP:0,answered:false};
  document.getElementById('quiz-emoji').textContent = person.emoji;
  document.getElementById('quiz-person-name').textContent = person.name;
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion(){
  const {questions,current,results} = quizState;
  const q = questions[current];
  // progress
  const prog = document.getElementById('quiz-progress');
  prog.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    let c='prog-dot';
    if(i<current) c+=results[i]?' done-correct':' done-wrong';
    else if(i===current) c+=' current';
    d.className=c; prog.appendChild(d);
  });
  document.getElementById('q-num').textContent=`第${current+1}問 / 全${questions.length}問`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('feedback-area').innerHTML='';
  document.getElementById('next-btn').style.display='none';
  quizState.answered=false;
  // choices
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  const indexed=q.choices.map((c,i)=>({text:c,original:i})).sort(()=>Math.random()-.5);
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  indexed.forEach((item,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-letter">${letters[i]}</span>${item.text}`;
    btn.onclick=()=>answer(item.original===q.answer,btn,indexed,q.answer,choicesEl);
    choicesEl.appendChild(btn);
  });
}

function answer(correct,clickedBtn,indexed,correctOriginal,choicesEl){
  if(quizState.answered) return;
  quizState.answered=true;
  quizState.results.push(correct);
  choicesEl.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(indexed[i].original===correctOriginal) btn.classList.add('correct');
  });
  if(!correct) clickedBtn.classList.add('wrong');
  if(correct){ quizState.earnedXP+=CORRECT_XP; addXP(CORRECT_XP); }
  const isLast=quizState.current===quizState.questions.length-1;
  const soFar=quizState.results.filter(Boolean).length;
  const fb=document.createElement('div');
  if(correct){
    fb.className='feedback-banner correct';
    fb.textContent=`⭕ 正解！ +${CORRECT_XP}XP`;
  } else {
    const nearPerfect=soFar===quizState.questions.length-1&&isLast;
    fb.className='feedback-banner '+(nearPerfect?'near-miss':'wrong');
    fb.textContent=nearPerfect?'😣 おしい！あと1問で全問正解だった！':'❌ 不正解…';
  }
  document.getElementById('feedback-area').appendChild(fb);
  document.getElementById('next-btn').style.display='block';
  document.getElementById('next-btn').textContent=isLast?'結果を見る 🏁':'つぎへ →';
}

function nextQuestion(){
  quizState.current++;
  if(quizState.current>=quizState.questions.length) showResult();
  else renderQuestion();
}

// ══════════════════════════════════════════
//  RESULT
// ══════════════════════════════════════════
function showResult(){
  const {personId,person,questions,results,earnedXP}=quizState;
  const correct=results.filter(Boolean).length;
  const perfect=correct===questions.length;
  const ps=personSave(personId);
  let totalXP=earnedXP;
  let bonusMsg='';
  if(perfect){
    totalXP+=PERFECT_BONUS; addXP(PERFECT_BONUS);
    bonusMsg=`🌟 全問正解ボーナス +${PERFECT_BONUS}XP！`;
    const wasUnlocked=ps.unlocked;
    ps.cleared++; ps.unlocked=true; persist();
    const unlockEl=document.getElementById('unlock-area');
    if(!wasUnlocked){
      unlockEl.innerHTML=`<div class="unlock-banner"><h3>🔓 解放！</h3><p>${person.emoji} <strong>${person.name}</strong> を解放した！</p></div>`;
    } else {
      const cnt=ps.cleared;
      const extra=cnt===3?'✨ 背景が変わった！':cnt===5?'🏆 マスター達成！':'';
      unlockEl.innerHTML=`<div class="unlock-banner"><h3>🌟 クリア！</h3><p>${person.emoji} <strong>${person.name}</strong> クリア${cnt}回目！ ${extra}</p></div>`;
    }
  } else {
    persist();
    const near=correct===questions.length-1&&!ps.unlocked;
    document.getElementById('unlock-area').innerHTML=near
      ?`<div class="near-miss-banner">😣 おしい！あと1問で解放できた！次がんばろう！</div>`
      :'';
  }
  document.getElementById('result-emoji').textContent=correct===5?'🏆':correct>=3?'⭐':'📖';
  document.getElementById('result-title').textContent=correct===5?'全問正解！！':correct>=3?'よくできました！':'もう一度挑戦！';
  document.getElementById('result-sub').textContent=bonusMsg||`${correct}/${questions.length} 正解`;
  document.getElementById('res-correct').textContent=`${correct}/${questions.length}`;
  document.getElementById('res-xp').textContent=`+${totalXP}`;
  document.getElementById('res-clear').textContent=`${ps.cleared}回`;
  showScreen('result-screen');
}

function playAgain(){ startQuiz(quizState.personId); }

// ══════════════════════════════════════════
//  COLLECTION
// ══════════════════════════════════════════
let collFilter = 'すべて';

function showCollection(){
  collFilter = 'すべて';
  buildCollection();
  showScreen('collection-screen');
}

function buildCollection(){
  // 集計
  const allPS = PEOPLE.map(p=>({p, ps:personSave(p.id)}));
  const unlockedCount = allPS.filter(x=>x.ps.unlocked).length;
  const masteredCount = allPS.filter(x=>x.ps.cleared>=5).length;
  const totalClear    = allPS.reduce((s,x)=>s+x.ps.cleared,0);
  document.getElementById('coll-unlocked-count').textContent = unlockedCount;
  document.getElementById('coll-mastered-count').textContent = masteredCount;
  document.getElementById('coll-total-clear').textContent    = totalClear;

  // フィルターボタン
  const filters = ['すべて','解放ずみ','未解放', ...ERA_ORDER];
  const filterEl = document.getElementById('coll-filter');
  filterEl.innerHTML='';
  filters.forEach(f=>{
    const btn=document.createElement('button');
    btn.className='coll-filter-btn'+(f===collFilter?' active':'');
    btn.textContent=f;
    btn.onclick=()=>{ collFilter=f; buildCollection(); };
    filterEl.appendChild(btn);
  });

  // グリッド
  let list = PEOPLE;
  if(collFilter==='解放ずみ') list=PEOPLE.filter(p=>personSave(p.id).unlocked);
  else if(collFilter==='未解放') list=PEOPLE.filter(p=>!personSave(p.id).unlocked);
  else if(collFilter!=='すべて') list=PEOPLE.filter(p=>p.era===collFilter);

  const grid=document.getElementById('coll-grid');
  grid.innerHTML='';
  list.forEach(p=>{
    const ps=personSave(p.id);
    const cnt=ps.cleared;
    const isUnlocked=ps.unlocked;
    const isMastered=cnt>=5;

    const card=document.createElement('div');
    card.className='coll-card '+(isMastered?'mastered':isUnlocked?'unlocked':'locked');
    if(isMastered) card.style.background='linear-gradient(135deg,#243010,#182008)';
    else if(cnt>=3) card.style.background='linear-gradient(135deg,#0e2440,#081830)';

    // 星（クリア回数を星で表現）
    const stars = isUnlocked ? '⭐'.repeat(Math.min(cnt,5)) + (cnt>5?` ×${cnt}`:'') : '';

    card.innerHTML = `
      <span class="coll-emoji">${p.emoji}</span>
      <div class="coll-name">${isUnlocked?p.name:'？？？？'}</div>
      <div class="coll-kana">${isUnlocked?p.kana:'\u3000'}</div>
      <span class="coll-era">${p.era}</span>
      ${stars?`<div class="coll-stars">${stars}</div>`:''}
      ${cnt>0?`<div class="coll-clear">${cnt}回</div>`:''}
      ${!isUnlocked?`<div class="coll-lock-icon">🔒</div>`:''}
    `;
    if(isUnlocked){
      card.onclick=()=>openModal(p.id);
    }
    grid.appendChild(card);
  });
}

// ── モーダル ──
function openModal(personId){
  const p=PEOPLE.find(x=>x.id===personId);
  const ps=personSave(personId);
  const qCount=QUESTIONS.filter(q=>q.personId===personId).length;
  document.getElementById('modal-emoji').textContent=p.emoji;
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-kana').textContent=p.kana;
  document.getElementById('modal-era').textContent=p.era+'時代';
  document.getElementById('modal-hint').textContent=p.hint;
  document.getElementById('modal-clear').textContent=ps.cleared+'回';
  document.getElementById('modal-questions').textContent=qCount+'問';
  const playBtn=document.getElementById('modal-play-btn');
  playBtn.onclick=()=>{ closeModal(); startQuiz(personId); };
  document.getElementById('coll-modal-bg').classList.add('show');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('coll-modal-bg')&&e.target!==document.getElementById('coll-modal-close')) return;
  document.getElementById('coll-modal-bg').classList.remove('show');
}

// ══════════════════════════════════════════
//  TOAST / POPUP
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
function showXPPopup(amount){
  const el=document.createElement('div');
  el.className='xp-popup'; el.textContent=`+${amount}XP`;
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
updateHUD();
checkDaily();
</script>
